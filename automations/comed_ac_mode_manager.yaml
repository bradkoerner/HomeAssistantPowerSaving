alias: AC Mode Manager
description: Sets AC price tier and time window helpers, then applies AC settings
triggers:
  - trigger: state
    entity_id: sensor.comed_current_hour_average_price
    id: price_changed
  - trigger: time
    at: "05:30:00"
    id: wake_up
  - trigger: time
    at: "07:00:00"
    id: bedroom_3_off
  - trigger: time
    at: "11:30:00"
    id: weekend_midday_start
  - trigger: time
    at: "15:30:00"
    id: weekend_midday_end
  - trigger: time
    at: "19:00:00"
    id: bedroom_3_on
  - trigger: time
    at: "20:00:00"
    id: bedroom_on
  - trigger: time
    at: "21:30:00"
    id: bedtime
  - trigger: time
    at: "00:00:00"
    id: midnight_reset
  - trigger: homeassistant
    event: start
  - trigger: state
    entity_id: input_select.ac_override_mode
    id: override_changed
actions:
  - if:
      - condition: trigger
        id: midnight_reset
      - condition: state
        entity_id: input_select.ac_override_mode
        state: comfort
    then:
      - action: input_select.select_option
        target:
          entity_id: input_select.ac_override_mode
        data:
          option: none
  - alias: Set price tier
    choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states('sensor.comed_current_hour_average_price') | float >
              states('sensor.comed_price_mean') | float * 1.50 }}
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_price_tier
            data:
              option: extreme
      - conditions:
          - condition: template
            value_template: >
              {{ states('sensor.comed_current_hour_average_price') | float >
              states('sensor.comed_price_mean') | float * 1.20 }}
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_price_tier
            data:
              option: high
    default:
      - action: input_select.select_option
        target:
          entity_id: input_select.ac_price_tier
        data:
          option: normal
  - alias: Set time window
    choose:
      - conditions:
          - condition: time
            after: "05:30:00"
            before: "21:30:00"
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_time_window
            data:
              option: awake
    default:
      - action: input_select.select_option
        target:
          entity_id: input_select.ac_time_window
        data:
          option: night
  - alias: Apply settings
    action: script.apply_ac_settings
mode: single
