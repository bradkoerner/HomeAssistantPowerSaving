blueprint:
  name: ComEd Hourly Pricing — Dehumidifier Control
  description: >
    Runs a dehumidifier only when ComEd hourly price is below 80% of the
    rolling mean and windows are closed. Triggers on price changes and
    window state changes so it responds immediately to either condition
    changing.

  domain: automation
  input:
    price_sensor:
      name: ComEd Hourly Price Sensor
      description: Current hour average price in cents (e.g. sensor.comed_current_hour_average_price)
      selector:
        entity:
          domain: sensor
    price_mean_sensor:
      name: ComEd Price Rolling Mean
      description: Statistics helper — rolling mean of the price sensor (e.g. sensor.comed_price_mean)
      selector:
        entity:
          domain: sensor
    dehumidifier_switch:
      name: Dehumidifier Switch
      description: Switch or smart plug controlling the dehumidifier (e.g. switch.dehumidifier_plug)
      selector:
        entity:
          domain: switch
    windows_open_boolean:
      name: Windows Open Helper
      description: input_boolean that is on when windows are open (e.g. input_boolean.windows_open)
      selector:
        entity:
          domain: input_boolean

variables:
  price_sensor: !input price_sensor
  price_mean_sensor: !input price_mean_sensor

trigger:
  - trigger: state
    entity_id: !input price_sensor
    id: price_changed
  - trigger: state
    entity_id: !input windows_open_boolean
    to: "on"
    id: windows_opened
  - trigger: state
    entity_id: !input windows_open_boolean
    to: "off"
    id: windows_closed
  - trigger: homeassistant
    event: start

action:
  - if:
      - condition: template
        value_template: "{{ states(price_sensor) | float < states(price_mean_sensor) | float * 0.80 }}"
        alias: Price is below 80% of rolling mean
      - condition: state
        entity_id: !input windows_open_boolean
        state: "off"
        alias: Windows are closed
    then:
      - action: switch.turn_on
        target:
          entity_id: !input dehumidifier_switch
    else:
      - action: switch.turn_off
        target:
          entity_id: !input dehumidifier_switch

mode: single
