blueprint:
  name: ComEd Hourly Pricing — EV Smart Charging
  description: >
    Charges an EV based on ComEd hourly pricing relative to a rolling mean,
    with four SOC-based tiers. The lower the battery, the more aggressively it
    charges. Includes a manual override to force charging regardless of price.

    Charging tiers:
      - SOC < 30%:  charge always (emergency threshold)
      - SOC 30-50%: charge if price < 90% of rolling mean
      - SOC 50-70%: charge if price < 70% of rolling mean
      - SOC > 70%:  charge if price < 50% of rolling mean

    All SOC-based tiers include a staleness check — if the battery sensor
    hasn't updated in 30 minutes, that tier is skipped to avoid acting on
    stale data.

  domain: automation
  input:
    price_sensor:
      name: ComEd Hourly Price Sensor
      description: Current hour average price in cents (e.g. sensor.comed_current_hour_average_price)
      selector:
        entity:
          domain: sensor
    price_mean_sensor:
      name: ComEd Price Rolling Mean
      description: Statistics helper — rolling mean of the price sensor (e.g. sensor.comed_price_mean)
      selector:
        entity:
          domain: sensor
    battery_sensor:
      name: EV Battery Level Sensor
      description: EV state of charge in percent (e.g. sensor.2023_ioniq_5_ev_battery_level)
      selector:
        entity:
          domain: sensor
    charger_switch:
      name: EV Charger Switch
      description: Switch that controls the EV charger (e.g. switch.car_charger)
      selector:
        entity:
          domain: switch

variables:
  price_sensor: !input price_sensor
  price_mean_sensor: !input price_mean_sensor
  battery_sensor: !input battery_sensor
  charger_switch: !input charger_switch

trigger:
  - trigger: state
    entity_id: !input battery_sensor
  - trigger: state
    entity_id: !input price_sensor
  - trigger: homeassistant
    event: start

action:
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.ev_charge_override
            state: "on"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charger_switch
      - conditions:
          - condition: template
            value_template: "{{ (now() - states[battery_sensor].last_updated).total_seconds() < 1800 }}"
          - condition: template
            value_template: "{{ states(battery_sensor) | float < 30 }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charger_switch
        alias: EV below 30%
      - conditions:
          - condition: template
            value_template: "{{ (now() - states[battery_sensor].last_updated).total_seconds() < 1800 }}"
          - condition: template
            value_template: "{{ states(battery_sensor) | float < 50 }}"
          - condition: template
            value_template: "{{ states(price_sensor) | float < states(price_mean_sensor) | float * 0.90 }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charger_switch
        alias: EV 30-50% and price < 90% of mean
      - conditions:
          - condition: template
            value_template: "{{ (now() - states[battery_sensor].last_updated).total_seconds() < 1800 }}"
          - condition: template
            value_template: "{{ states(battery_sensor) | float < 70 }}"
          - condition: template
            value_template: "{{ states(price_sensor) | float < states(price_mean_sensor) | float * 0.70 }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charger_switch
        alias: EV 50-70% and price < 70% of mean
      - conditions:
          - condition: template
            value_template: "{{ (now() - states[battery_sensor].last_updated).total_seconds() < 1800 }}"
          - condition: template
            value_template: "{{ states(price_sensor) | float < states(price_mean_sensor) | float * 0.50 }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charger_switch
        alias: EV > 70% and price < 50% of mean
    default:
      - action: switch.turn_off
        target:
          entity_id: !input charger_switch

mode: single
