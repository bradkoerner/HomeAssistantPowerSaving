alias: EV Smart Charging - ComEd Price Logic
description: >
  Charges EV based on four priority tiers: 1. SOC below 30% → charge always 2.
  SOC 30-50% → charge below 90% of rolling mean 3. SOC 50-70% → charge below 70%
  of rolling mean 4. SOC above 70% → charge below 50% of rolling mean
triggers:
  - trigger: state
    entity_id: sensor.2023_ioniq_5_ev_battery_level
  - trigger: state
    entity_id: sensor.comed_current_hour_average_price
  - trigger: homeassistant
    event: start
conditions: []
actions:
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.ev_charge_override
            state: "on"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.car_charger
      - conditions:
          - condition: template
            value_template: >
              {{ (now() -
              states['sensor.2023_ioniq_5_ev_battery_level'].last_updated).total_seconds()
              < 1800 }}
          - condition: numeric_state
            entity_id: sensor.2023_ioniq_5_ev_battery_level
            below: 30
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.car_charger
        alias: EV below 30%
      - conditions:
          - condition: template
            value_template: >
              {{ (now() -
              states['sensor.2023_ioniq_5_ev_battery_level'].last_updated).total_seconds()
              < 1800 }}
          - condition: numeric_state
            entity_id: sensor.2023_ioniq_5_ev_battery_level
            below: 50
          - condition: template
            value_template: >
              {{ states('sensor.comed_current_hour_average_price') | float <
              states('sensor.comed_price_baseline') | float * 0.90 }}
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.car_charger
        alias: EV 30-50% and electricity < 90% of mean
      - conditions:
          - condition: template
            value_template: >
              {{ (now() -
              states['sensor.2023_ioniq_5_ev_battery_level'].last_updated).total_seconds()
              < 1800 }}
          - condition: numeric_state
            entity_id: sensor.2023_ioniq_5_ev_battery_level
            below: 70
          - condition: template
            value_template: >
              {{ states('sensor.comed_current_hour_average_price') | float <
              states('sensor.comed_price_baseline') | float * 0.70 }}
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.car_charger
        alias: EV 50-70% and electricity < 70% of mean
      - conditions:
          - condition: template
            value_template: >
              {{ (now() -
              states['sensor.2023_ioniq_5_ev_battery_level'].last_updated).total_seconds()
              < 1800 }}
          - condition: template
            value_template: >
              {{ states('sensor.comed_current_hour_average_price') | float <
              states('sensor.comed_price_baseline') | float * 0.50 }}
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.car_charger
        alias: Electricity < 50% of mean
    default:
      - action: switch.turn_off
        target:
          entity_id: switch.car_charger
