blueprint:
  name: ComEd Hourly Pricing — AC Mode Manager
  description: >
    Manages multi-zone AC based on ComEd hourly electricity pricing relative to
    a rolling mean. Sets price tier (normal/high/extreme) and time window
    (awake/night) helpers, then calls the Apply AC Settings script to implement
    zone-level logic.

    Requires the Apply AC Settings script and helpers from the companion package.
    See https://github.com/YOUR_USERNAME/ha-comed-energy-automations for full
    installation instructions.

    Price tiers:
      - normal:  price ≤ 120% of rolling mean
      - high:    price 120–150% of rolling mean
      - extreme: price > 150% of rolling mean

    Time windows:
      - awake: 5:30am – 9:00pm
      - night: 9:00pm – 5:30am

  domain: automation
  input:
    price_sensor:
      name: ComEd Hourly Price Sensor
      description: Current hour average price in cents (e.g. sensor.comed_current_hour_average_price)
      selector:
        entity:
          domain: sensor
    price_mean_sensor:
      name: ComEd Price Rolling Mean
      description: Statistics helper — rolling mean of the price sensor (e.g. sensor.comed_price_mean)
      selector:
        entity:
          domain: sensor

variables:
  price_sensor: !input price_sensor
  price_mean_sensor: !input price_mean_sensor

trigger:
  - trigger: state
    entity_id: !input price_sensor
    id: price_changed
  - trigger: time
    at: "05:30:00"
    id: wake_up
  - trigger: time
    at: "20:00:00"
    id: bedroom_on
  - trigger: time
    at: "21:00:00"
    id: bedtime
  - trigger: time
    at: "11:30:00"
    id: weekend_midday_start
  - trigger: time
    at: "15:30:00"
    id: weekend_midday_end
  - trigger: time
    at: "19:00:00"
    id: bedroom_3_on
  - trigger: time
    at: "07:00:00"
    id: bedroom_3_off
  - trigger: time
    at: "00:00:00"
    id: midnight_reset
  - trigger: homeassistant
    event: start
  - trigger: state
    entity_id: input_boolean.ac_comfort_override
    id: override_changed

action:
  - if:
      - condition: trigger
        id: midnight_reset
    then:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ac_comfort_override
  - alias: Set price tier
    choose:
      - conditions:
          - condition: template
            value_template: "{{ states(price_sensor) | float > states(price_mean_sensor) | float * 1.50 }}"
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_price_tier
            data:
              option: extreme
      - conditions:
          - condition: template
            value_template: "{{ states(price_sensor) | float > states(price_mean_sensor) | float * 1.20 }}"
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_price_tier
            data:
              option: high
    default:
      - action: input_select.select_option
        target:
          entity_id: input_select.ac_price_tier
        data:
          option: normal
  - alias: Set time window
    choose:
      - conditions:
          - condition: time
            after: "05:30:00"
            before: "21:00:00"
        sequence:
          - action: input_select.select_option
            target:
              entity_id: input_select.ac_time_window
            data:
              option: awake
    default:
      - action: input_select.select_option
        target:
          entity_id: input_select.ac_time_window
        data:
          option: night
  - alias: Apply settings
    action: script.apply_ac_settings

mode: single
